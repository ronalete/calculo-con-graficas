<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hipérbola — Curso Interactivo Completo realizado por Emmely Samara Medina Lopez Curso 1101 Jornada Mañana</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f1a;--surface:#141628;--surface2:#1c1f35;--surface3:#232644;
  --accent:#6c63ff;--accent2:#ff6b9d;--accent3:#00d4aa;--accent4:#ffd166;
  --text:#e8eaf6;--text2:#9ba3cc;--text3:#5a6080;
  --correct:#00d4aa;--wrong:#ff4757;--reveal:#3a3d5c;
  --border:#2a2d4a;--glow:rgba(108,99,255,0.3);
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Space Grotesk',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding:16px;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(0,212,170,0.05) 0%, transparent 50%);
}
#app{max-width:760px;margin:0 auto}

/* HEADER */
.header{
  text-align:center;padding:32px 20px 24px;
  position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
  pointer-events:none;
}
.logo{font-size:42px;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(108,99,255,0.6))}
h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;
   background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);
   -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.subtitle{color:var(--text2);font-size:14px;margin-top:6px}

/* TABS / MODES */
.mode-tabs{
  display:flex;gap:8px;margin:20px 0 16px;
  background:var(--surface);border-radius:14px;padding:6px;
  border:1px solid var(--border);
}
.mode-tab{
  flex:1;padding:10px 8px;border:none;border-radius:10px;
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  color:var(--text2);background:transparent;transition:all .2s;
}
.mode-tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(108,99,255,0.4)}
.mode-tab:hover:not(.active){background:var(--surface2);color:var(--text)}

/* PROGRESS */
.progress-wrap{margin:12px 0}
.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(90deg,var(--accent),var(--accent3))}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-top:5px}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px;text-align:center;
}
.stat-card .val{font-size:22px;font-weight:700;line-height:1}
.stat-card .lbl{font-size:11px;color:var(--text2);margin-top:3px}
.stat-card.green .val{color:var(--correct)}
.stat-card.red .val{color:var(--wrong)}
.stat-card.yellow .val{color:var(--accent4)}

/* FILTER ROW */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{
  padding:6px 14px;border-radius:20px;
  border:1.5px solid var(--border);
  font-size:12px;font-weight:600;cursor:pointer;
  background:var(--surface);color:var(--text2);
  font-family:inherit;transition:all .2s;
}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-btn:hover:not(.active){border-color:var(--accent);color:var(--text)}

/* QUESTION CARD */
.question-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:24px;margin-bottom:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.badge{
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;
}
.b-calc{background:rgba(0,212,170,0.15);color:var(--accent3);border:1px solid rgba(0,212,170,0.3)}
.b-graph{background:rgba(96,165,250,0.15);color:#60a5fa;border:1px solid rgba(96,165,250,0.3)}
.b-conc{background:rgba(108,99,255,0.15);color:#a78bfa;border:1px solid rgba(108,99,255,0.3)}
.b-fact{background:rgba(255,209,102,0.15);color:var(--accent4);border:1px solid rgba(255,209,102,0.3)}
.b-hard{background:rgba(255,71,87,0.15);color:#ff6b6b;border:1px solid rgba(255,71,87,0.3)}

.q-num{font-size:12px;color:var(--text3);font-weight:600}
.diff-dots{display:flex;gap:3px;align-items:center}
.diff-dot{width:7px;height:7px;border-radius:50%;background:var(--border)}
.diff-dot.filled{background:var(--accent4)}

.q-text{font-size:17px;line-height:1.6;font-weight:500;color:var(--text);margin-bottom:14px}
.q-formula{
  background:rgba(108,99,255,0.08);border-radius:10px;
  padding:12px 16px;font-family:'JetBrains Mono',monospace;
  font-size:14px;color:#a78bfa;
  border-left:3px solid var(--accent);margin-bottom:14px;
  border:1px solid rgba(108,99,255,0.2);
}

/* GRAPH CONTAINER */
.graph-container{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;padding:8px;margin-bottom:16px;
  text-align:center;position:relative;
}
.graph-controls{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  margin-top:8px;
}
.graph-btn{
  padding:5px 12px;font-size:12px;font-weight:600;
  border:1px solid var(--border);border-radius:8px;
  background:var(--surface);color:var(--text2);cursor:pointer;
  font-family:inherit;transition:all .15s;
}
.graph-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--accent)}
.graph-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

canvas{border-radius:10px;display:block;margin:0 auto}

/* OPTIONS */
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
@media(max-width:500px){.options{grid-template-columns:1fr}}
.options-1col{grid-template-columns:1fr!important}

.opt{
  padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;
  cursor:pointer;font-size:14px;text-align:left;background:var(--surface2);
  color:var(--text);transition:all .15s;font-family:inherit;
  display:flex;align-items:flex-start;gap:10px;line-height:1.5;
}
.opt-letter{
  width:24px;height:24px;min-width:24px;border-radius:6px;
  background:var(--surface3);color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
}
.opt:hover:not(:disabled){
  border-color:var(--accent);background:rgba(108,99,255,0.08);
  transform:translateY(-1px);box-shadow:0 4px 16px var(--glow);
}
.opt:hover:not(:disabled) .opt-letter{background:var(--accent);color:#fff}
.opt.correct{
  border-color:var(--correct);background:rgba(0,212,170,0.08);
  animation:popIn .3s ease;
}
.opt.correct .opt-letter{background:var(--correct);color:#fff}
.opt.wrong{border-color:var(--wrong);background:rgba(255,71,87,0.08)}
.opt.wrong .opt-letter{background:var(--wrong);color:#fff}
.opt.reveal{border-color:var(--reveal);color:var(--text3)}
.opt:disabled{cursor:default;transform:none!important}
@keyframes popIn{0%{transform:scale(0.97)}50%{transform:scale(1.02)}100%{transform:scale(1)}}

/* EXPLANATION */
.explanation{
  margin-top:16px;background:rgba(0,212,170,0.06);
  border-radius:12px;padding:16px;font-size:14px;line-height:1.7;
  display:none;border:1px solid rgba(0,212,170,0.2);
  animation:slideIn .3s ease;
}
.exp-header{
  display:flex;align-items:center;gap:8px;
  font-weight:700;margin-bottom:10px;font-size:14px;
}
.exp-wrong{background:rgba(255,71,87,0.06);border-color:rgba(255,71,87,0.2)}
.exp-wrong .exp-header{color:#ff6b6b}
.exp-right .exp-header{color:var(--correct)}
.exp-detail{color:var(--text2)}
.exp-formula{
  font-family:'JetBrains Mono',monospace;font-size:13px;
  background:var(--surface2);border-radius:8px;padding:8px 12px;
  margin-top:8px;color:var(--accent4);
}

/* HINT BOX */
.hint-box{
  background:rgba(255,209,102,0.06);border:1px solid rgba(255,209,102,0.2);
  border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text2);
  margin-bottom:14px;display:none;animation:slideIn .3s;
}
.hint-box.visible{display:block}

/* NAV ROW */
.nav-row{
  display:flex;gap:8px;margin-top:16px;align-items:center;flex-wrap:wrap;
}
button{
  padding:10px 20px;border:1.5px solid var(--border);border-radius:12px;
  background:var(--surface2);cursor:pointer;font-size:14px;font-weight:600;
  color:var(--text);transition:all .2s;font-family:inherit;
}
button:hover:not(:disabled){
  border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,0.08);
}
button:disabled{opacity:.4;cursor:default}
button.primary{
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  color:#fff;border-color:transparent;
  box-shadow:0 4px 16px rgba(108,99,255,0.4);
}
button.primary:hover:not(:disabled){
  box-shadow:0 6px 24px rgba(108,99,255,0.6);
  transform:translateY(-1px);color:#fff;border-color:transparent;
  background:linear-gradient(135deg,#7c73ff,#9c6fff);
}
.btn-hint{font-size:12px;padding:8px 14px;color:var(--accent4);border-color:rgba(255,209,102,0.3)}
.btn-hint:hover:not(:disabled){background:rgba(255,209,102,0.08);border-color:var(--accent4);color:var(--accent4)}

/* HARD QUESTION TYPES */
.drag-area{
  min-height:80px;background:var(--surface2);border:2px dashed var(--border);
  border-radius:12px;padding:12px;display:flex;flex-wrap:wrap;
  align-items:flex-start;gap:8px;margin-top:10px;transition:border-color .2s;
}
.drag-area.over{border-color:var(--accent);background:rgba(108,99,255,0.05)}
.drag-area.filled{border-color:var(--correct);border-style:solid}
.drag-piece{
  padding:8px 14px;background:var(--surface3);border:1.5px solid var(--border);
  border-radius:10px;cursor:grab;font-family:'JetBrains Mono',monospace;
  font-size:14px;font-weight:600;color:var(--accent);
  user-select:none;transition:all .15s;
}
.drag-piece:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px var(--glow)}
.drag-piece:active{cursor:grabbing}
.drag-piece.dragging{opacity:.5}
.drag-piece.placed{background:rgba(108,99,255,0.1);border-color:var(--accent)}

.fill-blank{
  display:inline-block;min-width:80px;height:32px;
  border-bottom:2px solid var(--accent3);background:rgba(0,212,170,0.05);
  border-radius:4px 4px 0 0;padding:0 8px;
  font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;
  color:var(--text);text-align:center;vertical-align:middle;
  outline:none;border-top:none;border-left:none;border-right:none;
  transition:border-color .2s;
}
.fill-blank:focus{border-color:var(--accent);background:rgba(108,99,255,0.08)}
.fill-blank.correct-fill{border-color:var(--correct);background:rgba(0,212,170,0.1);color:var(--correct)}
.fill-blank.wrong-fill{border-color:var(--wrong);background:rgba(255,71,87,0.1);color:var(--wrong)}

.step-exercise{counter-reset:step}
.step{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px;background:var(--surface2);border-radius:12px;
  margin-bottom:10px;border:1px solid var(--border);
}
.step-num{
  width:28px;height:28px;min-width:28px;border-radius:8px;
  background:var(--accent);color:#fff;font-weight:700;font-size:13px;
  display:flex;align-items:center;justify-content:center;
}
.step-content{flex:1;font-size:14px;line-height:1.7;color:var(--text2)}
.step-content strong{color:var(--text)}

/* RESULT SCREEN */
.result-screen{
  text-align:center;padding:40px 20px;animation:slideIn .4s ease;
}
.result-emoji{font-size:64px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(255,209,102,0.5))}
.result-score{
  font-size:72px;font-weight:700;line-height:1;
  background:linear-gradient(135deg,var(--accent4),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.result-msg{font-size:16px;color:var(--text2);margin:12px 0 28px}
.result-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  max-width:340px;margin:0 auto 28px;
}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* TOPIC INTRO SCREEN */
.topic-screen{animation:slideIn .35s ease}
.topic-hero{
  background:linear-gradient(135deg,rgba(108,99,255,0.15),rgba(0,212,170,0.08));
  border:1px solid rgba(108,99,255,0.2);border-radius:20px;
  padding:28px;margin-bottom:20px;
}
.topic-hero h2{font-size:22px;font-weight:700;margin-bottom:8px;color:var(--text)}
.topic-hero p{color:var(--text2);font-size:14px;line-height:1.7}
.topic-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:20px;margin-bottom:12px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:16px;
}
.topic-card:hover{border-color:var(--accent);transform:translateX(4px);box-shadow:0 4px 20px var(--glow)}
.topic-icon{font-size:28px;min-width:48px;text-align:center}
.topic-info h3{font-size:15px;font-weight:600;margin-bottom:4px}
.topic-info p{font-size:12px;color:var(--text2)}
.topic-count{
  margin-left:auto;background:var(--surface2);
  border-radius:20px;padding:4px 12px;font-size:12px;
  font-weight:700;color:var(--accent);border:1px solid rgba(108,99,255,0.2);
  white-space:nowrap;
}

/* EXAMPLE WALKTHROUGH */
.walkthrough{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
}
.wt-header{
  background:linear-gradient(135deg,rgba(108,99,255,0.2),rgba(0,212,170,0.1));
  padding:20px 24px;border-bottom:1px solid var(--border);
}
.wt-header h2{font-size:18px;font-weight:700}
.wt-header p{color:var(--text2);font-size:13px;margin-top:4px}
.wt-body{padding:20px 24px}
.wt-step{
  border-left:3px solid var(--border);padding-left:18px;
  margin-bottom:20px;position:relative;
}
.wt-step.active{border-color:var(--accent)}
.wt-step-title{font-weight:700;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.wt-step-icon{font-size:16px}
.wt-step-body{color:var(--text2);font-size:14px;line-height:1.7}
.wt-formula{
  font-family:'JetBrains Mono',monospace;font-size:13px;
  background:var(--surface2);border-radius:8px;padding:10px 14px;
  margin:8px 0;color:var(--accent4);border:1px solid var(--border);
}
.wt-nav{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:space-between;align-items:center}
.wt-dots{display:flex;gap:6px}
.wt-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s}
.wt-dot.active{background:var(--accent);width:24px;border-radius:4px}

/* TOAST */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;
  z-index:999;transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  display:flex;align-items:center;gap:8px;max-width:340px;text-align:center;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--correct);color:var(--correct)}
.toast.err{border-color:var(--wrong);color:var(--wrong)}

/* SOUND INDICATOR */
.sound-btn{
  position:fixed;bottom:20px;right:20px;
  width:44px;height:44px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:100;box-shadow:0 4px 16px rgba(0,0,0,0.3);transition:all .2s;
  padding:0;
}
.sound-btn:hover{border-color:var(--accent);transform:scale(1.1)}

/* RESPONSIVE */
@media(max-width:480px){
  h1{font-size:22px}.q-text{font-size:15px}
  .opt{font-size:13px}.stats-row{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>
<div id="app"></div>
<button class="sound-btn" id="soundBtn" onclick="toggleSound()" title="Sonido">🔊</button>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// AUDIO ENGINE (Web Audio API)
// ═══════════════════════════════════════════════
let audioCtx=null,soundOn=true;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type='sine',vol=0.3){
  if(!soundOn)return;
  try{
    const a=getAudio();
    const osc=a.createOscillator();const gain=a.createGain();
    osc.connect(gain);gain.connect(a.destination);
    osc.type=type;osc.frequency.value=freq;
    gain.gain.setValueAtTime(vol,a.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    osc.start();osc.stop(a.currentTime+dur);
  }catch(e){}
}
function playCorrect(){
  playTone(523,0.12,'sine',0.2);
  setTimeout(()=>playTone(659,0.12,'sine',0.2),80);
  setTimeout(()=>playTone(784,0.2,'sine',0.25),160);
}
function playWrong(){
  playTone(220,0.12,'sawtooth',0.15);
  setTimeout(()=>playTone(196,0.25,'sawtooth',0.15),100);
}
function playClick(){playTone(440,0.05,'sine',0.1);}
function playNav(){playTone(330,0.07,'sine',0.08);}
function playFinish(){
  [523,659,784,1046].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'sine',0.2),i*100));
}
function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';
  showToast(soundOn?'🔊 Sonido activado':'🔇 Sonido desactivado','ok');
}

function showToast(msg,type='ok',dur=2200){
  const t=document.getElementById('toast');
  t.innerHTML=msg;t.className='toast '+type;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ═══════════════════════════════════════════════
// ALL QUESTIONS BANK
// ═══════════════════════════════════════════════
const ALL_Q = [
  // ——— CONCEPTOS ———
  {t:"conc",diff:1,q:"¿Cuál es la definición exacta de hipérbola?",f:null,
   opts:["Lugar geométrico de puntos cuya diferencia de distancias a dos focos es constante (2a)","Lugar geométrico de puntos equidistantes a un foco y una directriz","Lugar geométrico de puntos cuya suma de distancias a dos focos es constante","Sección cónica formada al cortar un cono paralelo a la base"],ans:0,
   hint:"Piensa: elipse usa SUMA de distancias; hipérbola usa...",
   exp:"La hipérbola se define como el conjunto de puntos P donde |PF₁ − PF₂| = 2a. La DIFERENCIA (no suma) de distancias a los focos es constante. Esto la diferencia de la elipse.",
   formula_exp:"|PF₁ − PF₂| = 2a (constante)"},

  {t:"conc",diff:1,q:"En x²/a² − y²/b² = 1, ¿qué son los vértices?",f:"x²/a² − y²/b² = 1",
   opts:["Puntos (±a, 0) — donde la curva cruza el eje x","Puntos (0, ±b)","Puntos (±c, 0) — los focos","Puntos (±a, ±b)"],ans:0,
   hint:"Los vértices están sobre el eje REAL de la hipérbola",
   exp:"Los vértices son los puntos más cercanos al centro en cada rama. Para eje horizontal se ubican en (a,0) y (−a,0). No confundir con focos (±c,0) que están más afuera.",
   formula_exp:"Vértices: (±a, 0) | Focos: (±c, 0) donde c > a"},

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}

// Mezcla las OPCIONES de cada pregunta y actualiza ans al nuevo índice
function shuffleOpts(q){
  const correct=q.opts[q.ans];
  const shuffled=shuffle([...q.opts]);
  return {...q, opts:shuffled, ans:shuffled.indexOf(correct)};
}

function initQuiz(){
  let pool=state.filter==='all'?ALL_Q:ALL_Q.filter(q=>q.t===state.filter);
  // Mezcla orden de preguntas Y opciones de cada una
  state.questions=shuffle(pool).map(shuffleOpts);
  state.current=0;state.score=0;state.answered=0;state.hintsUsed=0;
  state.userAnswers=new Array(state.questions.length).fill(-1);
  state.showResult=false;
}

function render(){
  const app=document.getElementById('app');
  if(state.mode==='menu'){renderMenu(app);return;}
  if(state.mode==='walkthrough'){renderWalkthrough(app);return;}
  if(state.mode==='hard'){renderHard(app);return;}
  if(state.mode==='quiz'){
    if(state.showResult){renderResult(app);return;}
    renderQuiz(app);
  }
}

    <div class="q-meta">
      <span class="badge ${typeClasses[q.t]||'b-conc'}">${typeLabels[q.t]||q.t}</span>
      <span class="q-num">Dificultad:</span>
      <div class="diff-dots">${diffDots}</div>
    </div>
    <div class="q-text">${q.q}</div>
    ${q.f?`<div class="q-formula">${q.f}</div>`:''}
    ${(q.t==='graph')?`<div class="graph-container" id="graphContainer"></div>`:''}
    <div class="hint-box${done||!q.hint?'':''}" id="hintBox">
      💡 <strong>Pista:</strong> ${q.hint||''}
    </div>
    <div class="options${isLong?' options-1col':''}" id="optContainer">
      ${optHtml}
    </div>
    ${done?`
    <div class="explanation ${ua===q.ans?'exp-right':'exp-wrong'}">
      <div class="exp-header">${ua===q.ans?'✅ ¡Correcto!':'❌ Incorrecto — respuesta correcta: '+optLetters[q.ans]+')'}</div>
      <div class="exp-detail">${q.exp}</div>
      ${q.formula_exp?`<div class="exp-formula">${q.formula_exp}</div>`:''}
    </div>`:''}
    <div class="nav-row">
      <button onclick="prev()" ${state.current===0?'disabled':''}>← Anterior</button>
      ${!done?`<button class="btn-hint" onclick="showHint()" ${!q.hint?'disabled':''}>💡 Pista</button>`:''}
      <button class="primary" onclick="next()">Siguiente →</button>
      <button onclick="()=>{state.showResult=true;render()}" style="margin-left:auto;font-size:12px;color:var(--text3)" onclick="finishEarly()">Ver resultado</button>
    </div>
  </div>`;

  // Draw graph if needed
  if(q.t==='graph'){
    setTimeout(()=>{
      const gc=document.getElementById('graphContainer');
      if(!gc)return;
      const cv=document.createElement('canvas');
      cv.width=320;cv.height=220;cv.id='hc';
      gc.appendChild(cv);
      renderGraphControls(gc,q);
      const m=q.f?(q.f.match(/\d+/g)||[]):[9,4];
      let a=3,b=2,vertical=false;
      if(m.length>=2){a=Math.sqrt(parseInt(m[0])||9);b=Math.sqrt(parseInt(m[1])||4);}
      if(q.f&&q.f.trim().startsWith('y'))vertical=true;
      drawHyperbolaFull(cv,a,b,vertical,{showAsymptotes:true,showVertices:true,showFoci:true});
    },50);
  }
}

let graphLayers={asymptotes:true,vertices:true,foci:true,rect:false,latus:false};
let _curQ=null;
function toggleLayer(layer,btn){
  playClick();
  graphLayers[layer]=!graphLayers[layer];
  btn.classList.toggle('active');
  const cv=document.getElementById('hc');if(!cv)return;
  const q=state.questions[state.current];
  const m=q.f?(q.f.match(/\d+/g)||[]):[9,4];
  let a=3,b=2,vertical=false;
  if(m.length>=2){a=Math.sqrt(parseInt(m[0])||9);b=Math.sqrt(parseInt(m[1])||4);}
  if(q.f&&q.f.trim().startsWith('y'))vertical=true;
  drawHyperbolaFull(cv,a,b,vertical,graphLayers);
}

// ═══════════════════════════════════════════════
// HYPERBOLA DRAWING ENGINE — versión anotada
// ═══════════════════════════════════════════════
function drawHyperbolaFull(canvas,a,b,vertical=false,opts={}){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Fondo con gradiente sutil
  const bgGrad=ctx.createLinearGradient(0,0,W,H);
  bgGrad.addColorStop(0,'#0d0f1e');bgGrad.addColorStop(1,'#111328');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // Escala adaptativa: que la hipérbola ocupe bien el canvas
  const maxVal=Math.max(a,b)*2.8;
  const scale=Math.min(W,H)*0.42/maxVal;
  const ox=W/2,oy=H/2;

  // ── Cuadrícula con números ──
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  const gridStep=Math.ceil(maxVal/4);
  for(let i=-10;i<=10;i++){
    ctx.beginPath();ctx.moveTo(ox+i*gridStep*scale,0);ctx.lineTo(ox+i*gridStep*scale,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,oy+i*gridStep*scale);ctx.lineTo(W,oy+i*gridStep*scale);ctx.stroke();
  }
  // Números del eje
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='9px JetBrains Mono,monospace';ctx.textAlign='center';
  for(let i=-3;i<=3;i++){
    if(i===0)continue;
    const v=i*gridStep;
    ctx.fillText(v,ox+v*scale,oy+13);
    ctx.textAlign='right';ctx.fillText(v,ox-4,oy-v*scale+3);ctx.textAlign='center';
  }

  // ── Ejes principales ──
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.5;
  // Eje X con flecha
  ctx.beginPath();ctx.moveTo(8,oy);ctx.lineTo(W-8,oy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W-8,oy);ctx.lineTo(W-14,oy-4);ctx.moveTo(W-8,oy);ctx.lineTo(W-14,oy+4);ctx.stroke();
  // Eje Y con flecha
  ctx.beginPath();ctx.moveTo(ox,H-8);ctx.lineTo(ox,8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,8);ctx.lineTo(ox-4,14);ctx.moveTo(ox,8);ctx.lineTo(ox+4,14);ctx.stroke();
  // Etiquetas de ejes
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='bold 11px Space Grotesk,sans-serif';
  ctx.textAlign='center';ctx.fillText('x',W-6,oy-8);
  ctx.textAlign='left';ctx.fillText('y',ox+6,10);
  // Origen
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='9px JetBrains Mono,monospace';
  ctx.textAlign='right';ctx.fillText('0',ox-4,oy+11);

  // Para eje vertical, a y b se intercambian en la representación
  const ta=vertical?b:a, tb=vertical?a:b;
  const c=Math.sqrt(a*a+b*b);
  const e=(c/a).toFixed(2);
  const lr=(2*b*b/a).toFixed(2);

  // ── Rectángulo auxiliar ──
  if(opts.rect){
    ctx.save();
    ctx.strokeStyle='rgba(255,209,102,0.35)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.strokeRect(ox-ta*scale,oy-tb*scale,2*ta*scale,2*tb*scale);
    ctx.setLineDash([]);
    // Etiquetas del rectángulo
    ctx.fillStyle='rgba(255,209,102,0.6)';ctx.font='9px JetBrains Mono,monospace';
    ctx.textAlign='center';
    ctx.fillText(`2a=${(2*a).toFixed(1)}`,ox,oy-tb*scale-5);
    ctx.textAlign='left';
    ctx.fillText(`2b=${(2*b).toFixed(1)}`,ox+ta*scale+4,oy);
    ctx.restore();
  }

  // ── Asíntotas ──
  if(opts.asymptotes!==false){
    ctx.save();
    ctx.strokeStyle='rgba(167,139,250,0.55)';ctx.lineWidth=1.2;ctx.setLineDash([6,4]);
    const slope=vertical?(a/b):(b/a);
    // y = slope*x  →  at x=0: y=oy, at x=W: y=oy-(W-ox)*slope
    // Asíntota y = +slope*x
    ctx.beginPath();
    ctx.moveTo(0, oy + ox*slope);
    ctx.lineTo(W, oy - (W-ox)*slope);
    ctx.stroke();
    // Asíntota y = -slope*x
    ctx.beginPath();
    ctx.moveTo(0, oy - ox*slope);
    ctx.lineTo(W, oy + (W-ox)*slope);
    ctx.stroke();
    ctx.setLineDash([]);
    // Etiqueta asíntota
    ctx.fillStyle='rgba(167,139,250,0.75)';ctx.font='bold 10px JetBrains Mono,monospace';
    const slopeNum=vertical?a:b, slopeDen=vertical?b:a;
    const slopeStr=Number.isInteger(slopeNum/slopeDen)?`${slopeNum/slopeDen}`:`${slopeNum}/${slopeDen}`;
    ctx.textAlign='right';
    ctx.fillText(`asíntota: y=±${slopeStr}x`,W-6,16);
    ctx.restore();
  }

  // ── Curvas de la hipérbola ──
  const curveColor=vertical?'#00d4aa':'#60a5fa';
  const glowColor=vertical?'rgba(0,212,170,0.18)':'rgba(96,165,250,0.18)';

  for(let branch=0;branch<2;branch++){
    // Glow exterior
    ctx.save();
    ctx.strokeStyle=glowColor;ctx.lineWidth=9;ctx.lineCap='round';
    ctx.beginPath();let first=true;
    for(let t=-3.5;t<=3.5;t+=0.025){
      let px,py;
      if(vertical){const y=(branch===0?1:-1)*a*Math.cosh(t),x=b*Math.sinh(t);px=ox+x*scale;py=oy-y*scale;}
      else{const x=(branch===0?1:-1)*a*Math.cosh(t),y=b*Math.sinh(t);px=ox+x*scale;py=oy-y*scale;}
      if(px<-10||px>W+10||py<-10||py>H+10){first=true;continue;}
      if(first){ctx.moveTo(px,py);first=false;}else ctx.lineTo(px,py);
    }
    ctx.stroke();ctx.restore();

    // Curva principal
    ctx.strokeStyle=curveColor;ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();first=true;
    for(let t=-3.5;t<=3.5;t+=0.02){
      let px,py;
      if(vertical){const y=(branch===0?1:-1)*a*Math.cosh(t),x=b*Math.sinh(t);px=ox+x*scale;py=oy-y*scale;}
      else{const x=(branch===0?1:-1)*a*Math.cosh(t),y=b*Math.sinh(t);px=ox+x*scale;py=oy-y*scale;}
      if(px<-5||px>W+5||py<-5||py>H+5){first=true;continue;}
      if(first){ctx.moveTo(px,py);first=false;}else ctx.lineTo(px,py);
    }
    ctx.stroke();

    // Etiqueta de rama
    if(opts.vertices!==false){
      const branchLabel=branch===0?'Rama 1':'Rama 2';
      let lx,ly;
      if(vertical){lx=ox+5;ly=branch===0?oy-a*scale*1.6:oy+a*scale*1.6;}
      else{lx=branch===0?ox+a*scale*1.5:ox-a*scale*1.5;ly=b*scale*0.8+oy;}
      if(lx>0&&lx<W&&ly>0&&ly<H){
        ctx.fillStyle=curveColor;ctx.font='bold 9px Space Grotesk,sans-serif';
        ctx.textAlign=vertical?'left':(branch===0?'left':'right');
        ctx.fillText(branchLabel,lx,ly);
      }
    }
  }

  // ── Vértices ──
  if(opts.vertices!==false){
    const vPts=vertical?[[ox,oy-a*scale],[ox,oy+a*scale]]:[[ox+a*scale,oy],[ox-a*scale,oy]];
    const vLabels=vertical?[`V₁(0,${a})`,`V₂(0,−${a})`]:[`V₁(${a},0)`,`V₂(−${a},0)`];
    vPts.forEach(([px,py],i)=>{
      // Línea punteada al eje
      ctx.save();ctx.strokeStyle='rgba(255,209,102,0.25)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
      if(vertical){ctx.beginPath();ctx.moveTo(ox-15,py);ctx.lineTo(ox+15,py);ctx.stroke();}
      else{ctx.beginPath();ctx.moveTo(px,oy-15);ctx.lineTo(px,oy+15);ctx.stroke();}
      ctx.restore();
      // Punto
      ctx.beginPath();ctx.arc(px,py,5.5,0,Math.PI*2);
      ctx.fillStyle='#ffd166';ctx.fill();
      ctx.strokeStyle='#0d0f1e';ctx.lineWidth=2;ctx.stroke();
      // Etiqueta con fondo
      const lbl=vLabels[i];
      const lx=vertical?px+10:px;
      const ly=vertical?py+4:py-10;
      ctx.font='bold 10px Space Grotesk,sans-serif';
      const tw=ctx.measureText(lbl).width;
      ctx.fillStyle='rgba(13,15,30,0.7)';
      ctx.fillRect(lx-2,ly-11,tw+4,14);
      ctx.fillStyle='#ffd166';ctx.textAlign='left';
      ctx.fillText(lbl,lx,ly);
    });
  }

  // ── Focos ──
  if(opts.foci!==false){
    const fPts=vertical?[[ox,oy-c*scale],[ox,oy+c*scale]]:[[ox+c*scale,oy],[ox-c*scale,oy]];
    const cf=parseFloat(c.toFixed(2));
    const fLabels=vertical?[`F₁(0,${cf})`,`F₂(0,−${cf})`]:[`F₁(${cf},0)`,`F₂(−${cf},0)`];
    fPts.forEach(([px,py],i)=>{
      if(px<2||px>W-2||py<2||py>H-2)return;
      // Cruz indicadora
      ctx.save();ctx.strokeStyle='rgba(255,107,157,0.4)';ctx.lineWidth=1;ctx.setLineDash([2,2]);
      ctx.beginPath();ctx.moveTo(px-10,py);ctx.lineTo(px+10,py);ctx.stroke();
      ctx.beginPath();ctx.moveTo(px,py-10);ctx.lineTo(px,py+10);ctx.stroke();
      ctx.restore();
      // Punto (rombo)
      ctx.save();ctx.translate(px,py);ctx.rotate(Math.PI/4);
      ctx.fillStyle='#ff6b9d';
      ctx.fillRect(-4.5,-4.5,9,9);
      ctx.restore();
      // Etiqueta
      const lbl=fLabels[i];
      const lx=vertical?px+10:px;
      const ly=vertical?py+4:py+16;
      ctx.font='bold 10px Space Grotesk,sans-serif';
      const tw=ctx.measureText(lbl).width;
      if(lx+tw<W&&ly<H&&lx>0&&ly>0){
        ctx.fillStyle='rgba(13,15,30,0.7)';
        ctx.fillRect(lx-2,ly-11,tw+4,14);
        ctx.fillStyle='#ff6b9d';ctx.textAlign='left';
        ctx.fillText(lbl,lx,ly);
      }
    });
  }

  // ── Lado recto ──
  if(opts.latus){
    const lrVal=2*b*b/a;
    ctx.save();ctx.strokeStyle='rgba(0,212,170,0.7)';ctx.lineWidth=2.5;ctx.lineCap='round';
    if(vertical){
      ctx.beginPath();ctx.moveTo(ox-lrVal/2*scale,oy-c*scale);ctx.lineTo(ox+lrVal/2*scale,oy-c*scale);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ox-lrVal/2*scale,oy+c*scale);ctx.lineTo(ox+lrVal/2*scale,oy+c*scale);ctx.stroke();
    }else{
      ctx.beginPath();ctx.moveTo(ox+c*scale,oy-lrVal/2*scale);ctx.lineTo(ox+c*scale,oy+lrVal/2*scale);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ox-c*scale,oy-lrVal/2*scale);ctx.lineTo(ox-c*scale,oy+lrVal/2*scale);ctx.stroke();
    }
    // Etiqueta LR
    ctx.fillStyle='rgba(0,212,170,0.85)';ctx.font='bold 10px JetBrains Mono,monospace';
    if(!vertical&&ox+c*scale+5<W){
      ctx.textAlign='left';
      ctx.fillText(`LR=${lrVal.toFixed(2)}`,ox+c*scale+5,oy-lrVal/2*scale-4);
    }else if(vertical){
      ctx.textAlign='left';
      ctx.fillText(`LR=${lrVal.toFixed(2)}`,ox+lrVal/2*scale+5,oy-c*scale);
    }
    ctx.restore();
  }

  // ── Panel de información ──
  const infoLines=[
    `a=${a.toFixed(2)}  b=${b.toFixed(2)}  c=${c.toFixed(2)}`,
    `e = c/a = ${e}`,
    `LR = 2b²/a = ${lr}`,
    vertical?'Eje: Vertical (y²>0)':'Eje: Horizontal (x²>0)',
  ];
  const panelW=152,panelH=70,panelX=6,panelY=H-panelH-6;
  ctx.fillStyle='rgba(13,15,30,0.75)';
  ctx.beginPath();ctx.roundRect(panelX,panelY,panelW,panelH,8);ctx.fill();
  ctx.strokeStyle='rgba(108,99,255,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(panelX,panelY,panelW,panelH,8);ctx.stroke();
  ctx.font='10px JetBrains Mono,monospace';ctx.textAlign='left';
  infoLines.forEach((line,i)=>{
    ctx.fillStyle=i===0?'rgba(255,255,255,0.6)':i===1?'#a78bfa':i===2?'#00d4aa':'rgba(255,255,255,0.35)';
    ctx.fillText(line,panelX+8,panelY+16+i*14);
  });

  // ── Leyenda de colores ──
  if(opts.vertices!==false||opts.foci!==false||opts.asymptotes!==false){
    const legendItems=[];
    if(opts.asymptotes!==false)legendItems.push({color:'rgba(167,139,250,0.75)',label:'Asíntotas'});
    if(opts.vertices!==false)legendItems.push({color:'#ffd166',label:'Vértices'});
    if(opts.foci!==false)legendItems.push({color:'#ff6b9d',label:'Focos'});
    if(opts.rect)legendItems.push({color:'rgba(255,209,102,0.5)',label:'Rectángulo aux.'});
    if(opts.latus)legendItems.push({color:'#00d4aa',label:'Lado recto'});

    const lW=110,lH=legendItems.length*14+10;
    const lX=W-lW-6,lY=H-lH-6;
    ctx.fillStyle='rgba(13,15,30,0.75)';
    ctx.beginPath();ctx.roundRect(lX,lY,lW,lH,8);ctx.fill();
    ctx.strokeStyle='rgba(108,99,255,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(lX,lY,lW,lH,8);ctx.stroke();
    legendItems.forEach((item,i)=>{
      ctx.fillStyle=item.color;
      ctx.fillRect(lX+8,lY+7+i*14,10,10);
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.font='9px Space Grotesk,sans-serif';
      ctx.textAlign='left';
      ctx.fillText(item.label,lX+22,lY+16+i*14);
    });
  }
}

// ═══════════════════════════════════════════════
// ANSWER & NAV
// ═══════════════════════════════════════════════
function answer(qi,i){
  if(state.userAnswers[qi]>=0)return;
  state.userAnswers[qi]=i;
  state.answered++;
  if(i===state.questions[qi].ans){
    state.score++;
    playCorrect();
    showToast('✅ ¡Correcto!','ok',1500);
  }else{
    playWrong();
    showToast('❌ Incorrecto — revisa la explicación','err',2000);
  }
  render();
}

function showHint(){
  playClick();
  state.hintsUsed++;
  const hb=document.getElementById('hintBox');
  if(hb){hb.classList.toggle('visible');}
}

function next(){
  playNav();
  if(state.current<state.questions.length-1){state.current++;render();}
  else{state.showResult=true;playFinish();render();}
}
function prev(){playNav();if(state.current>0){state.current--;render();}}
function changeFilter(f){playClick();state.filter=f;initQuiz();render();}
function backToMenu(){playClick();state.mode='menu';render();}
function finishEarly(){state.showResult=true;playFinish();render();}

// ═══════════════════════════════════════════════
// RESULT
// ═══════════════════════════════════════════════
function renderResult(app){
  const pct=state.answered?Math.round(state.score/state.answered*100):0;
  const emoji=pct>=90?'🏆':pct>=70?'⭐':pct>=50?'📚':'💪';
  const msg=pct>=90?'¡Eres un experto en hipérbolas!':pct>=70?'¡Muy bien! Estás dominando el tema.':pct>=50?'Buen progreso. Repasa los errores.':'Sigue practicando, ¡tú puedes!';
  app.innerHTML=`
  <div class="result-screen">
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${pct}%</div>
    <div class="result-msg">${msg}</div>
    <div class="result-grid">
      <div class="stat-card green"><div class="val">${state.score}</div><div class="lbl">Correctas</div></div>
      <div class="stat-card red"><div class="val">${state.answered-state.score}</div><div class="lbl">Incorrectas</div></div>
      <div class="stat-card yellow"><div class="val">${state.questions.length-state.answered}</div><div class="lbl">Sin resp.</div></div>
    </div>
    ${state.hintsUsed>0?`<div style="font-size:13px;color:var(--text2);margin-bottom:20px">Pistas usadas: ${state.hintsUsed}</div>`:''}
    <div class="result-actions">
      <button class="primary" onclick="restartQuiz()">🔄 Repetir (aleatorio)</button>
      <button onclick="reviewWrong()">📋 Revisar errores</button>
      <button onclick="backToMenu()">🏠 Menú</button>
    </div>
  </div>`;
}

function restartQuiz(){playClick();initQuiz();render();}
function reviewWrong(){
  const wrong=state.questions.filter((_,i)=>state.userAnswers[i]>=0&&state.userAnswers[i]!==state.questions[i].ans);
  if(!wrong.length){showToast('¡Sin errores que revisar! 🎉','ok');return;}
  state.questions=shuffle(wrong);
  state.userAnswers=new Array(state.questions.length).fill(-1);
  state.score=0;state.answered=0;state.hintsUsed=0;state.current=0;state.showResult=false;
  render();
}

// WALKTHROUGH (Ejemplo guiado)
// ═══════════════════════════════════════════════
const WT_STEPS=[
  {icon:'📌',title:'¿Qué es la hipérbola?',body:`

    <strong>Definición formal:</strong> Lugar geométrico de puntos P donde la <em>diferencia</em> de distancias a dos focos fijos F₁ y F₂ es constante:
    <div class="wt-formula">|PF₁ − PF₂| = 2a (constante)</div>
    Tiene <strong>dos ramas</strong> simétricas y <strong>dos asíntotas</strong> que nunca toca.`,canvas:null},
  {icon:'📐',title:'Forma canónica y elementos',body:`
    La ecuación <strong>canónica u estándar</strong> para eje horizontal:
    <div class="wt-formula">x²/a² − y²/b² = 1</div>
    Sus elementos fundamentales:
    <div class="wt-formula">• a = semi-eje real (distancia al vértice)
• b = semi-eje conjugado
• c = distancia al foco, donde c² = a² + b²
• e = c/a > 1 (excentricidad)
• Asíntotas: y = ±(b/a)x
• Lado recto: LR = 2b²/a</div>`,canvas:{a:3,b:2,vertical:false}},
  {icon:'🔢',title:'Ejemplo: Analizar x²/9 − y²/16 = 1',body:`
    <strong>Paso 1:</strong> Extraer a y b
    <div class="wt-formula">a² = 9 → a = 3 | b² = 16 → b = 4</div>
    <strong>Paso 2:</strong> Calcular c
    <div class="wt-formula">c² = a² + b² = 9 + 16 = 25 → c = 5</div>
    <strong>Paso 3:</strong> Elementos completos
    <div class="wt-formula">Vértices: (±3, 0) | Focos: (±5, 0)
Asíntotas: y = ±(4/3)x ≈ ±1.33x
e = c/a = 5/3 ≈ 1.67 | LR = 2(16)/3 = 32/3</div>`,canvas:{a:3,b:4,vertical:false}},
  {icon:'🔄',title:'Hipérbola con eje vertical: y²/25 − x²/9 = 1',body:`
    Cuando y² tiene signo positivo, el eje real es <strong>vertical</strong>:
    <div class="wt-formula">y²/25 − x²/9 = 1 → a² = 25, b² = 9</div>
    <strong>Diferencias clave:</strong>
    <div class="wt-formula">• a = 5 (del término y²)
• Vértices: (0, ±5) — en el eje y
• Focos: (0, ±c) con c² = 25+9 = 34 → c ≈ 5.83
• Asíntotas: y = ±(a/b)x = ±(5/3)x
• Ramas abren ARRIBA y ABAJO</div>`,canvas:{a:5,b:3,vertical:true}},
  {icon:'📊',title:'De general a canónica: completar cuadrado',body:`
    Ecuación general: <strong>9x² − 4y² − 36x + 8y + 4 = 0</strong><br><br>
    <strong>Paso 1:</strong> Agrupar por variable
    <div class="wt-formula">(9x² − 36x) − (4y² − 8y) = −4</div>
    <strong>Paso 2:</strong> Factor común
    <div class="wt-formula">9(x² − 4x) − 4(y² − 2y) = −4</div>
    <strong>Paso 3:</strong> Completar cuadrado
    <div class="wt-formula">9(x−2)² − 9·4 − 4(y−1)² + 4·1 = −4
9(x−2)² − 4(y−1)² = −4 + 36 − 4 = 28... 
Ajustando: → (x−2)²/(4/1) − (y−1)²/(9/1) = 1</div>
    Centro (2,1), a²=4/?, hipérbola desplazada.`,canvas:{a:2,b:3,vertical:false,cx:60,cy:0}},
];

function startWalkthrough(){playClick();state.mode='walkthrough';state.wtStep=0;render();}

function renderWalkthrough(app){
  const s=WT_STEPS[state.wtStep];
  const dots=WT_STEPS.map((_,i)=>`<div class="wt-dot${i===state.wtStep?' active':''}" onclick="wtGo(${i})"></div>`).join('');
  app.innerHTML=`
  <div style="margin-bottom:12px">
    <button onclick="backToMenu()" style="padding:7px 14px;font-size:12px">← Menú</button>
  </div>
  <div class="walkthrough">
    <div class="wt-header">
      <h2>📖 Ejemplo guiado: Hipérbola de A a Z</h2>
      <p>Paso ${state.wtStep+1} de ${WT_STEPS.length}</p>
    </div>
    <div class="wt-body">
      <div class="wt-step active">
        <div class="wt-step-title"><span class="wt-step-icon">${s.icon}</span>${s.title}</div>
        <div class="wt-step-body">${s.body}</div>
        ${s.canvas?`<div class="graph-container" id="wtCanvas" style="margin-top:14px"></div>`:''}
      </div>
    </div>
    <div class="wt-nav">
      <button onclick="wtPrev()" ${state.wtStep===0?'disabled':''}>← Anterior</button>
      <div class="wt-dots">${dots}</div>
      ${state.wtStep<WT_STEPS.length-1?`<button class="primary" onclick="wtNext()">Siguiente →</button>`:`<button class="primary" onclick="backToMenu()">🏠 Menú principal</button>`}
    </div>
  </div>`;

  if(s.canvas){
    setTimeout(()=>{
      const gc=document.getElementById('wtCanvas');if(!gc)return;
      const cv=document.createElement('canvas');
      cv.width=340;cv.height=240;gc.appendChild(cv);
      const controls=document.createElement('div');
      controls.className='graph-controls';
      controls.innerHTML=`
        <button class="graph-btn active" onclick="wtToggle('asymptotes',this)">Asíntotas</button>
        <button class="graph-btn active" onclick="wtToggle('vertices',this)">Vértices</button>
        <button class="graph-btn active" onclick="wtToggle('foci',this)">Focos</button>
        <button class="graph-btn" onclick="wtToggle('rect',this)">Rectángulo</button>
        <button class="graph-btn" onclick="wtToggle('latus',this)">Lado recto</button>
      `;
      gc.appendChild(controls);
      drawHyperbolaFull(cv,s.canvas.a,s.canvas.b,s.canvas.vertical||false,{asymptotes:true,vertices:true,foci:true,rect:false,latus:false});
      cv._a=s.canvas.a;cv._b=s.canvas.b;cv._v=s.canvas.vertical||false;
    },50);
  }
}

let wtLayers={asymptotes:true,vertices:true,foci:true,rect:false,latus:false};
function wtToggle(layer,btn){
  playClick();
  wtLayers[layer]=!wtLayers[layer];
  btn.classList.toggle('active');
  const cv=document.querySelector('#wtCanvas canvas');
  if(cv)drawHyperbolaFull(cv,cv._a,cv._b,cv._v,wtLayers);
}
function wtNext(){playNav();state.wtStep++;render();}
function wtPrev(){playNav();state.wtStep--;render();}
function wtGo(i){playClick();state.wtStep=i;render();}

// ═══════════════════════════════════════════════
// HARD EXERCISES
// ═══════════════════════════════════════════════
function startHard(){playClick();state.mode='hard';state.hardExIdx=0;state.hardStepIdx=0;state.hardInputs={};state.hardDone={};render();}

function renderHard(app){
  const ex=HARD_EXERCISES[state.hardExIdx];
  const step=ex.steps[state.hardStepIdx];
  const totalSteps=ex.steps.length;
  const pct=Math.round(state.hardStepIdx/totalSteps*100);
  const exDone=state.hardDone[ex.id];

  // Steps progress
  const stepDots=ex.steps.map((_,i)=>{
    const done=i<state.hardStepIdx||(i===state.hardStepIdx&&exDone);
    const active=i===state.hardStepIdx;
    return `<div style="width:${active?'28px':'10px'};height:10px;border-radius:5px;background:${done?'var(--correct)':active?'var(--accent)':'var(--border)'};transition:all .3s"></div>`;
  }).join('');

  const inputs=state.hardInputs[ex.id]||{};

  let stepHtml='';
  if(step.blanks){
    stepHtml=step.blanks.map(b=>`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
        <span style="font-size:14px;color:var(--text2);min-width:120px">${b.label}</span>
        <input class="fill-blank${inputs[b.id]===b.ans?' correct-fill':inputs[b.id]&&inputs[b.id]!==b.ans?' wrong-fill':''}"
          id="inp_${b.id}" value="${inputs[b.id]||''}" placeholder="${b.hint}"
          oninput="hardInput('${ex.id}','${b.id}',this.value)"
          style="width:160px" ${exDone?'disabled':''}/>
        ${inputs[b.id]===b.ans?'<span style="color:var(--correct)">✓</span>':inputs[b.id]&&inputs[b.id]!==b.ans?`<span style="font-size:12px;color:var(--text2)">💡 Pista: ${b.hint}</span>`:''}
      </div>`).join('');
  }else if(step.choice){
    stepHtml=step.choice.opts.map((o,i)=>`
      <button class="opt${inputs['choice']===i?(i===step.choice.ans?' correct':' wrong'):(exDone&&i===step.choice.ans?' correct':'')}" 
        ${exDone?'disabled':''} onclick="hardChoice('${ex.id}',${i})">
        <span class="opt-letter">${String.fromCharCode(65+i)}</span>
        <span>${o}</span>
      </button>`).join('');
  }

  const allCorrect=step.blanks?step.blanks.every(b=>inputs[b.id]===b.ans)
    :step.choice?inputs['choice']===step.choice.ans:false;

  app.innerHTML=`
  <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center">
    <button onclick="backToMenu()" style="padding:7px 14px;font-size:12px">← Menú</button>
    <div style="flex:1;text-align:center">
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Ejercicio ${state.hardExIdx+1} de ${HARD_EXERCISES.length}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  </div>

  <div class="question-card">
    <div class="q-meta">
      <span class="badge b-hard">🔥 Nivel Difícil</span>
      <span style="font-size:12px;color:var(--text2)">Paso ${state.hardStepIdx+1}/${totalSteps}: ${step.label}</span>
    </div>
    <div class="q-formula" style="font-size:15px;margin-bottom:10px">${ex.equation}</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">${ex.intro}</div>

    <!-- Step progress -->
    <div style="display:flex;gap:4px;align-items:center;margin-bottom:16px">
      ${stepDots}
      <span style="font-size:11px;color:var(--text3);margin-left:6px">${step.label}</span>
    </div>

    <div style="font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text)">${step.task}</div>
    <div class="${step.choice?'options options-1col':''}">
      ${stepHtml}
    </div>

    ${allCorrect||exDone?`
    <div class="explanation exp-right" style="display:block;margin-top:16px">
      <div class="exp-header">✅ ¡Correcto! — ${step.label}</div>
      <div class="exp-detail">${step.blanks?step.blanks.map(b=>`<strong>${b.label}</strong> ${b.ans}`).join(' | '):step.choice?step.choice.opts[step.choice.ans]:''}</div>
    </div>`:''}

    <div class="nav-row" style="margin-top:16px">
      ${state.hardStepIdx>0?`<button onclick="hardPrev()">← Paso anterior</button>`:''}
      ${state.hardStepIdx===totalSteps-1||exDone?`
        <div id="hardGraph" style="margin:12px 0;width:100%"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;width:100%">
          ${state.hardExIdx<HARD_EXERCISES.length-1?`<button class="primary" onclick="hardNextEx()">Siguiente ejercicio →</button>`:'<button class="primary" onclick="backToMenu()">🏠 Completado</button>'}
        </div>`
      :`<button class="primary" ${!allCorrect?'disabled':''} onclick="hardNextStep()">Siguiente paso →</button>`}
    </div>
  </div>`;

  // Show graph on last step
  if(state.hardStepIdx===totalSteps-1||exDone){
    setTimeout(()=>{
      const gc=document.getElementById('hardGraph');if(!gc)return;
      const cv=document.createElement('canvas');cv.width=340;cv.height=230;gc.appendChild(cv);
      const controls=document.createElement('div');controls.className='graph-controls';
      controls.innerHTML=`
        <button class="graph-btn active" onclick="hardToggle('asymptotes',this)">Asíntotas</button>
        <button class="graph-btn active" onclick="hardToggle('vertices',this)">Vértices</button>
        <button class="graph-btn active" onclick="hardToggle('foci',this)">Focos</button>
        <button class="graph-btn" onclick="hardToggle('rect',this)">Rectángulo</button>
        <button class="graph-btn" onclick="hardToggle('latus',this)">Lado recto</button>
      `;
      gc.appendChild(controls);
      const g=ex.graph;
      drawHyperbolaFull(cv,g.a,g.b,g.vertical||false,{asymptotes:true,vertices:true,foci:true});
      cv._a=g.a;cv._b=g.b;cv._v=g.vertical||false;
      showToast('📈 Gráfica generada — activa capas con los botones','ok',2500);
    },100);
  }
}

let hardGraphLayers={asymptotes:true,vertices:true,foci:true,rect:false,latus:false};
function hardToggle(layer,btn){
  playClick();hardGraphLayers[layer]=!hardGraphLayers[layer];btn.classList.toggle('active');
  const cv=document.querySelector('#hardGraph canvas');
  if(cv)drawHyperbolaFull(cv,cv._a,cv._b,cv._v,hardGraphLayers);
}

function hardInput(exId,field,val){
  if(!state.hardInputs[exId])state.hardInputs[exId]={};
  state.hardInputs[exId][field]=val.trim();
  const ex=HARD_EXERCISES.find(e=>e.id===exId);
  const step=ex.steps[state.hardStepIdx];
  const allOk=step.blanks&&step.blanks.every(b=>state.hardInputs[exId][b.id]===b.ans);
  if(allOk){playCorrect();showToast('✅ ¡Paso completado!','ok',1500);}
  // Re-color inputs
  step.blanks.forEach(b=>{
    const inp=document.getElementById('inp_'+b.id);
    if(!inp)return;
    const v=state.hardInputs[exId][b.id];
    inp.className='fill-blank'+(v===b.ans?' correct-fill':v?' wrong-fill':'');
  });
  if(allOk)setTimeout(render,600);
}

function hardChoice(exId,i){
  if(!state.hardInputs[exId])state.hardInputs[exId]={};
  state.hardInputs[exId]['choice']=i;
  const ex=HARD_EXERCISES.find(e=>e.id===exId);
  const step=ex.steps[state.hardStepIdx];
  if(i===step.choice.ans){playCorrect();showToast('✅ ¡Correcto!','ok',1500);setTimeout(render,600);}
  else{playWrong();render();}
}

function hardNextStep(){
  playNav();
  const ex=HARD_EXERCISES[state.hardExIdx];
  if(state.hardStepIdx<ex.steps.length-1){
    state.hardStepIdx++;
    if(!state.hardInputs[ex.id])state.hardInputs[ex.id]={};
    render();
  }else{
    state.hardDone[ex.id]=true;
    showToast('🏆 ¡Ejercicio completado!','ok',3000);
    render();
  }
}
function hardPrev(){playNav();if(state.hardStepIdx>0){state.hardStepIdx--;render();}}
function hardNextEx(){
  playClick();
  state.hardExIdx++;state.hardStepIdx=0;
  if(!state.hardInputs[HARD_EXERCISES[state.hardExIdx].id])
    state.hardInputs[HARD_EXERCISES[state.hardExIdx].id]={};
  render();
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
render();
</script>
</body>
</html>
